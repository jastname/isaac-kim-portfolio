<!-- Micro-interactions Script -->
<script>
        // Simple visual feedback for list items and buttons
        document.querySelectorAll('.active\\:scale-95').forEach(el => {
            el.addEventListener('touchstart', () => {
                el.style.opacity = '0.7';
            });
            el.addEventListener('touchend', () => {
                el.style.opacity = '1';
            });
        });
        
        // Example of a ripple-like effect on project items
        const projectItems = document.querySelectorAll('.group');
        projectItems.forEach(item => {
            item.addEventListener('click', (e) => {
                const circle = document.createElement('div');
                const x = e.clientX - item.offsetLeft;
                const y = e.clientY - item.offsetTop;
                circle.style.left = `${x}px`;
                circle.style.top = `${y}px`;
                circle.classList.add('absolute', 'w-1', 'h-1', 'bg-primary/10', 'rounded-full', 'pointer-events-none', 'animate-ping');
                item.style.position = 'relative';
                item.appendChild(circle);
                setTimeout(() => circle.remove(), 400);
            });
        });
    </script>
